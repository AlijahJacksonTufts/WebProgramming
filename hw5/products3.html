<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <h1>Product Catalog</h1>

    <button id="loadBtn">Load All Products</button>

    <div class="filter-bar" id="filterBar" style="display:none;">
        <select id="categorySelect"></select>
        <button id="filterBtn">Filter</button>
    </div>

    <div id="result"></div>

    <script>
        var allProducts = [];

        // On page load, read the JSON to populate the selected element
        $.get("json/products.json", (data) => {
            allProducts = typeof data === "string" ? JSON.parse(data) : data;
            // Collect unique categories from all the products
            var categories = [];
            for (var i = 0; i < allProducts.length; i++) {
                for (var j = 0; j < allProducts[i].categories.length; j++) {
                    var cat = allProducts[i].categories[j];
                    if (categories.indexOf(cat) === -1) {
                        categories.push(cat);
                    }
                }
            }
            categories.sort();
            // Fills in the select dropdown with the categories
            var selectEl = document.getElementById("categorySelect");
            for (var k = 0; k < categories.length; k++) {
                var option = document.createElement("option");
                option.value = categories[k];
                option.textContent = categories[k];
                selectEl.appendChild(option);
            }
        });

        function poppulateFields(tag){
            var html = "";
            // Loops through the entire products length and populates the product item
            for (var i = 0; i < allProducts.length; i++) {
                var p = allProducts[i];
                var tags = "";
                //checks to see if any tag match
                let hasTag = false;
                for (var j = 0; j < p.categories.length; j++) {
                    if(p.categories[j] == tag) hasTag = true;
                    tags += '<span class="category-tag">' + p.categories[j] + '</span>';
                }
                // If is looking for tag and doenst find a match it skips this
                if(tag != null && !hasTag) continue;
                html += '<div class="product-card">';
                html += '<p class="product-name">' + p.name + '</p>';
                //only loads full info if not tagged
                if(!tag){
                    html += '<p class="product-description">' + p.description + '</p>';
                    html += '<p class="product-price">' + p.price + '</p>';
                    html += '<div>' + tags + '</div>';
                }
                html += '</div>';
            }
            // Finally set result html to generated element
            document.getElementById("result").innerHTML = html;
            //reveal the filter bar
            document.getElementById("filterBar").style.display = "flex";
        }
        
        //Loads ALL entries
        $("#loadBtn").click(() => {
            poppulateFields(null);
        });

        // only loads filtered entries
        $("#filterBtn").click(() => {
            var selected = document.getElementById("categorySelect").value;
            poppulateFields(selected);
        });
    </script>
</body>
</html>
